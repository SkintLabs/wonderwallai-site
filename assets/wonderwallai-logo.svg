<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1008"/>
      <stop offset="100%" stop-color="#0c0b0a"/>
    </linearGradient>
    <linearGradient id="wGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e9c46a"/>
      <stop offset="50%" stop-color="#f4a261"/>
      <stop offset="100%" stop-color="#e76f51"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e76f51"/>
      <stop offset="50%" stop-color="#f4a261"/>
      <stop offset="100%" stop-color="#e9c46a"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="196" fill="url(#bgGrad)"/>

  <!-- W letterform — drawn first so ring sits on top of its edges -->
  <path d="M 28 88 L 90 88 L 158 268 L 200 178 L 242 268 L 310 88 L 372 88 L 284 316 L 228 316 L 200 248 L 172 316 L 116 316 Z"
    fill="url(#wGrad)" filter="url(#glow)"/>

  <!-- Wide sunset ring — drawn over W edges for the Wario break-out effect -->
  <circle cx="200" cy="200" r="168" fill="none" stroke="url(#ringGrad)" stroke-width="44"/>

  <!-- ============================================================
       WEAPON SYMBOLS — dark navy, heraldic, on the ring band
       Ring center r=168. Weapons at 45° intervals.
       Positions: angle measured clockwise from top
         0°   → (200, 32)
         45°  → (319, 81)
         90°  → (368, 200)
         135° → (319, 319)
         180° → (200, 368)
         225° → (81, 319)
         270° → (32, 200)
         315° → (81, 81)
       ============================================================ -->

  <g fill="#0f1e3d" stroke="#0f1e3d">

    <!-- 1. CROSSED SWORDS — top (200, 32) -->
    <g transform="translate(200, 32)">
      <!-- Sword 1: blade NW, pommel SE -->
      <g transform="rotate(-45)">
        <polygon points="0,-12 -2,-5 2,-5" fill="#0f1e3d"/>
        <rect x="-1.3" y="-5" width="2.6" height="12" rx="0.6" fill="#0f1e3d"/>
        <rect x="-6" y="5" width="12" height="2.2" rx="1" fill="#0f1e3d"/>
        <circle cx="0" cy="9" r="2.2" fill="#0f1e3d"/>
      </g>
      <!-- Sword 2: blade NE, pommel SW -->
      <g transform="rotate(45)">
        <polygon points="0,-12 -2,-5 2,-5" fill="#0f1e3d"/>
        <rect x="-1.3" y="-5" width="2.6" height="12" rx="0.6" fill="#0f1e3d"/>
        <rect x="-6" y="5" width="12" height="2.2" rx="1" fill="#0f1e3d"/>
        <circle cx="0" cy="9" r="2.2" fill="#0f1e3d"/>
      </g>
    </g>

    <!-- 2. SPEAR — top-right (319, 81), pointing NE -->
    <g transform="translate(319, 81) rotate(45)">
      <!-- shaft -->
      <rect x="-1.1" y="-13" width="2.2" height="24" rx="0.6" fill="#0f1e3d"/>
      <!-- spearhead -->
      <polygon points="0,-16 -3.5,-10 3.5,-10" fill="#0f1e3d"/>
      <!-- butt spike -->
      <polygon points="0,13 -1.8,10 1.8,10" fill="#0f1e3d"/>
    </g>

    <!-- 3. SHIELD — right (368, 200) -->
    <g transform="translate(368, 200)">
      <!-- heater shield -->
      <path d="M-8,-11 L8,-11 L8,3 L0,12 L-8,3 Z" fill="#0f1e3d"/>
      <!-- embossed cross on shield -->
      <rect x="-1" y="-9" width="2" height="12" rx="0.4" fill="url(#ringGrad)"/>
      <rect x="-6" y="-4" width="12" height="2" rx="0.4" fill="url(#ringGrad)"/>
    </g>

    <!-- 4. CANNON — bottom-right (319, 319), barrel pointing SE -->
    <g transform="translate(319, 319) rotate(45)">
      <!-- barrel -->
      <rect x="-3.5" y="-13" width="7" height="16" rx="3.5" fill="#0f1e3d"/>
      <!-- breech (wider base) -->
      <rect x="-5" y="3" width="10" height="5" rx="2" fill="#0f1e3d"/>
      <!-- left wheel -->
      <circle cx="-6" cy="10" r="4" fill="#0f1e3d"/>
      <circle cx="-6" cy="10" r="2" fill="url(#ringGrad)"/>
      <!-- right wheel -->
      <circle cx="6" cy="10" r="4" fill="#0f1e3d"/>
      <circle cx="6" cy="10" r="2" fill="url(#ringGrad)"/>
    </g>

    <!-- 5. CROSSED ARROWS — bottom (200, 368) -->
    <g transform="translate(200, 368)">
      <!-- Arrow 1: NW→SE -->
      <g transform="rotate(-45)">
        <!-- shaft -->
        <rect x="-1" y="-12" width="2" height="22" rx="0.5" fill="#0f1e3d"/>
        <!-- arrowhead -->
        <polygon points="0,-14 -3,-10 3,-10" fill="#0f1e3d"/>
        <!-- fletching -->
        <polygon points="-1,8 -5,6 -1,11" fill="#0f1e3d"/>
        <polygon points="1,8 5,6 1,11" fill="#0f1e3d"/>
      </g>
      <!-- Arrow 2: NE→SW -->
      <g transform="rotate(45)">
        <rect x="-1" y="-12" width="2" height="22" rx="0.5" fill="#0f1e3d"/>
        <polygon points="0,-14 -3,-10 3,-10" fill="#0f1e3d"/>
        <polygon points="-1,8 -5,6 -1,11" fill="#0f1e3d"/>
        <polygon points="1,8 5,6 1,11" fill="#0f1e3d"/>
      </g>
    </g>

    <!-- 6. MUSKET/RIFLE — bottom-left (81, 319), pointing SW -->
    <g transform="translate(81, 319) rotate(225)">
      <!-- barrel -->
      <rect x="-1.2" y="-15" width="2.4" height="20" rx="0.8" fill="#0f1e3d"/>
      <!-- stock body -->
      <path d="M-1.2,5 L-5,14 L3,14 L1.2,5 Z" fill="#0f1e3d"/>
      <!-- trigger guard arc -->
      <path d="M0,3 Q5,6 3,11" fill="none" stroke="#0f1e3d" stroke-width="1.5"/>
      <!-- muzzle band -->
      <rect x="-2.5" y="-15" width="5" height="2.5" rx="0.5" fill="#0f1e3d"/>
    </g>

    <!-- 7. SWORD (single upright) — left (32, 200), pointing left -->
    <g transform="translate(32, 200) rotate(270)">
      <!-- blade -->
      <polygon points="0,-16 -2.5,-7 2.5,-7" fill="#0f1e3d"/>
      <rect x="-1.5" y="-7" width="3" height="13" rx="0.6" fill="#0f1e3d"/>
      <!-- crossguard -->
      <rect x="-8" y="6" width="16" height="2.5" rx="1.2" fill="#0f1e3d"/>
      <!-- grip -->
      <rect x="-1.8" y="8" width="3.6" height="7" rx="0.6" fill="#0f1e3d"/>
      <!-- pommel -->
      <circle cx="0" cy="17" r="2.8" fill="#0f1e3d"/>
    </g>

    <!-- 8. HALBERD/AXE — top-left (81, 81), pointing NW -->
    <g transform="translate(81, 81) rotate(315)">
      <!-- shaft -->
      <rect x="-1.2" y="-15" width="2.4" height="28" rx="0.6" fill="#0f1e3d"/>
      <!-- spike top -->
      <polygon points="0,-18 -2,-13 2,-13" fill="#0f1e3d"/>
      <!-- axe blade left -->
      <path d="M-1,-12 L-11,-6 L-9,2 L-1,0 Z" fill="#0f1e3d"/>
      <!-- back spike right -->
      <path d="M1,-8 L8,-4 L7,0 L1,-2 Z" fill="#0f1e3d"/>
      <!-- butt -->
      <polygon points="0,13 -2,10 2,10" fill="#0f1e3d"/>
    </g>

  </g>
</svg>
