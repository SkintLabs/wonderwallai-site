<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">

  <!-- Dark gradient background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0b0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1917;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bgGradient)"/>

  <!-- Code block container -->
  <rect x="100" y="80" width="1000" height="640" rx="16" fill="#0f0e0d" stroke="#333" stroke-width="2"/>

  <!-- Header -->
  <text x="140" y="150" font-family="monospace" font-size="42" font-weight="600" fill="#e76f51">
    Three Lines to Protect
  </text>
  <text x="140" y="190" font-family="monospace" font-size="16" fill="#888">
    Stop prompt injection before it reaches your LLM
  </text>

  <!-- Code -->
  <text x="140" y="260" font-family="monospace" font-size="18" fill="#569cd6">from</text>
  <text x="320" y="260" font-family="monospace" font-size="18" fill="#dcdcaa">wonderwallai</text>
  <text x="590" y="260" font-family="monospace" font-size="18" fill="#569cd6">import</text>
  <text x="760" y="260" font-family="monospace" font-size="18" fill="#dcdcaa">Firewall</text>

  <!-- Blank line -->

  <!-- Comment -->
  <text x="140" y="330" font-family="monospace" font-size="18" fill="#6a9955"># Initialize once in your app</text>

  <!-- fw = Firewall(...) -->
  <text x="140" y="390" font-family="monospace" font-size="18" fill="#d4d4d4">fw =</text>
  <text x="280" y="390" font-family="monospace" font-size="18" fill="#dcdcaa">Firewall</text>
  <text x="520" y="390" font-family="monospace" font-size="18" fill="#d4d4d4">(</text>

  <!-- topics -->
  <text x="160" y="440" font-family="monospace" font-size="18" fill="#d4d4d4">topics=</text>
  <text x="360" y="440" font-family="monospace" font-size="18" fill="#ce9178">"ecommerce"</text>
  <text x="620" y="440" font-family="monospace" font-size="18" fill="#d4d4d4">,</text>

  <!-- leak_detect -->
  <text x="160" y="490" font-family="monospace" font-size="18" fill="#d4d4d4">leak_detect=</text>
  <text x="500" y="490" font-family="monospace" font-size="18" fill="#569cd6">True</text>

  <!-- closing paren -->
  <text x="140" y="540" font-family="monospace" font-size="18" fill="#d4d4d4">)</text>

  <!-- Comment -->
  <text x="140" y="610" font-family="monospace" font-size="18" fill="#6a9955"># Scan every user input before your LLM sees it</text>

  <!-- Highlight box for key takeaway -->
  <rect x="100" y="720" width="1000" height="60" rx="8" fill="#e76f51" opacity="0.1" stroke="#e76f51" stroke-width="2"/>
  <text x="140" y="760" font-family="monospace" font-size="18" fill="#e76f51" font-weight="600">
    Block injection attacks, API key leaks, and jailbreak attempts in microseconds
  </text>
</svg>